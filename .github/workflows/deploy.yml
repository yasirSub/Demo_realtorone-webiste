name: Deploy Website to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          test -n "${{ secrets.VPS_HOST }}"
          test -n "${{ secrets.VPS_USERNAME }}"
          test -n "${{ secrets.VPS_SSH_KEY }}"
          test -n "${{ secrets.VPS_APP_DIR }}"
          test -n "${{ secrets.API_PROXY_URL }}"

      - name: Create deployment archive
        run: |
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=.env \
            --exclude=.env.local \
            -czf website-release.tgz .

      - name: Ensure target directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p "${{ secrets.VPS_APP_DIR }}"

      - name: Upload deployment archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: website-release.tgz
          target: ${{ secrets.VPS_APP_DIR }}

      - name: Deploy repo and restart Docker stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p "${{ secrets.VPS_APP_DIR }}"
            cd "${{ secrets.VPS_APP_DIR }}"

            tar -xzf website-release.tgz
            rm -f website-release.tgz

            export API_PROXY_URL="${{ secrets.API_PROXY_URL }}"
            export WEBSITE_PORT="${{ secrets.WEBSITE_PORT }}"

            docker compose -f compose.yaml up -d --build --remove-orphans
            docker image prune -f
