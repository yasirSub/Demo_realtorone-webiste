# RealtorOne Admin Website - VPS Docker deployment
# Uses a pre-built GitHub Container Registry image so Docker Manager / Portainer
# can update by pulling the latest image instead of rebuilding on the server.
#
# Portainer deploy:
#   1. Stacks > Add stack > Web editor
#   2. Paste this compose; set API_PROXY_URL env (Stacks > your stack > Editor > Environment)
#   3. Redeploy stack to pull the newest image after GitHub Actions publishes it.
version: '3.8'
services:
  website:
    image: ${WEBSITE_IMAGE:-ghcr.io/yasirsub/realtorone-website:latest}
    pull_policy: always
    container_name: realtorone-website
    restart: always
    ports:
      - "${WEBSITE_PORT:-80}:80"
    environment:
      # Point to your existing backend API (same VPS: use host IP or host.docker.internal)
      - API_PROXY_URL=${API_PROXY_URL:-http://host.docker.internal:8000/api/}
    extra_hosts:
      # Allow container to reach backend on host (Linux Docker)
      - "host.docker.internal:host-gateway"
