# RealtorOne Admin Website - VPS Docker deployment
# Uses same backend and database; set API_PROXY_URL to your backend (e.g. http://127.0.0.1:8000/api/)
#
# Portainer deploy:
#   1. Stacks > Add stack > Web editor
#   2. Paste this compose; set API_PROXY_URL env (Stacks > your stack > Editor > Environment)
#   3. Deploy. Website runs on WEBSITE_PORT (default 3001); /api proxies to backend.
version: '3.8'
services:
  website:
    # VPS-friendly: build locally (no GHCR login / package visibility issues)
    build:
      context: .
      dockerfile: Dockerfile
    image: realtorone-website:local
    container_name: realtorone-website
    restart: always
    ports:
      # Avoid port-80 conflict if another website stack already uses :80
      - "${WEBSITE_PORT:-3001}:80"
    environment:
      # Point to your existing backend API (same VPS: use host IP or host.docker.internal)
      - API_PROXY_URL=${API_PROXY_URL:-http://host.docker.internal:8000/api/}
    extra_hosts:
      # Allow container to reach backend on host (Linux Docker)
      - "host.docker.internal:host-gateway"
