# Same as compose.yaml - some tools look for docker-compose.yml
version: '3.8'
services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
    image: realtorone-website:local
    container_name: realtorone-website
    restart: always
    ports:
      - "${WEBSITE_PORT:-3001}:80"
    environment:
      - API_PROXY_URL=${API_PROXY_URL:-http://host.docker.internal:8000/api/}
    extra_hosts:
      - "host.docker.internal:host-gateway"
