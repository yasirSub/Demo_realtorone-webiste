# Same as compose.yaml - some tools prefer docker-compose.yml
version: '3.8'
services:
  website:
    image: ${WEBSITE_IMAGE:-ghcr.io/yasirsub/realtorone-website:latest}
    pull_policy: always
    container_name: realtorone-website
    restart: always
    ports:
      - "${WEBSITE_PORT:-80}:80"
    environment:
      - API_PROXY_URL=${API_PROXY_URL:-http://host.docker.internal:8000/api/}
    extra_hosts:
      - "host.docker.internal:host-gateway"